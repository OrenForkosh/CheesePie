<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CheesePie Tracker Preview</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <div>
          <h1>Tracker Preview</h1>
          <p class="subtitle">Preview video files tied to tracking outputs.</p>
        </div>
        <button id="open-button" type="button">Open Tracking File</button>
      </header>

      <section id="drop-zone" class="drop-zone">
        <p>Drop a <span class="code">.mp4.obj.mat</span> or <span class="code">.avi.obj.mat</span> file here.</p>
        <p class="hint">The app will load the matching video from the same folder.</p>
      </section>

      <section class="info">
        <div id="status" class="status">Awaiting tracking file...</div>
        <div id="file-path" class="file-path">No file loaded.</div>
      </section>

      <section class="video-panel">
        <video id="video-player" controls playsinline preload="metadata"></video>
      </section>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
