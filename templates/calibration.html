{% extends "base.html" %} {% block content %}
<section class="panel panel--nochrome" id="calibration-panel">
  <div class="cal-layout">

    <!-- ── Left sidebar: controls ──────────────────────────────────── -->
    <div class="subpanel cal-sidebar">

      <div class="control-group header-left" style="margin-bottom:12px">
        <h1>Calibrate</h1>
        <p class="muted">Align cameras to the arena mask.</p>
      </div>

      <!-- Camera discovery -->
      <div class="control-group">
        <label>Camera</label>
        <div style="display:flex;gap:6px;align-items:center">
          <select id="cal-camera-select" style="flex:1" disabled>
            <option value="">— scan to discover —</option>
          </select>
          <button class="btn" id="cal-scan-btn" title="Scan 10.0.0.x for cameras">Scan</button>
        </div>
        <div id="cal-scan-status" class="muted" style="margin-top:4px;font-size:12px"></div>
      </div>

      <!-- Profile selection -->
      <div class="control-group" id="cal-profile-group" style="display:none">
        <label for="cal-profile-select">Video Profile</label>
        <select id="cal-profile-select"></select>
      </div>

      <!-- Preview controls -->
      <div class="control-group" id="cal-preview-controls" style="display:none">
        <label>Preview</label>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn" id="cal-grab-btn">Grab Frame</button>
          <button class="btn" id="cal-auto-btn">Auto</button>
          <button class="btn" id="cal-live-btn">Live</button>
        </div>
        <div id="cal-preview-status" class="muted" style="margin-top:6px;font-size:12px"></div>
      </div>

      <!-- Image filters -->
      <div class="control-group" id="cal-filter-group" style="display:none">
        <label>Filters <span class="muted" style="font-weight:400;font-size:11px">(display only)</span></label>
        <div style="display:flex;gap:6px">
          <button class="btn mini cal-filter-btn" id="cal-filter-eq"  data-filter="eq">Equalize</button>
          <button class="btn mini cal-filter-btn" id="cal-filter-inv" data-filter="inv">Invert</button>
        </div>
      </div>

      <!-- Mask overlay -->
      <div class="control-group" id="cal-mask-group" style="display:none">
        <label>Mask Opacity</label>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="range" id="cal-mask-opacity" min="0" max="1" step="0.05" value="0.4" style="flex:1">
          <span id="cal-mask-opacity-val" class="muted" style="font-size:12px;width:32px">40%</span>
        </div>
      </div>

      <!-- PTZ controls -->
      <div class="control-group" id="cal-ptz-group" style="display:none">
        <label>Camera Control</label>
        <div class="cal-ptz-section">
          <div class="cal-ptz-row">
            <span class="muted" style="font-size:11px;width:52px">Zoom</span>
            <button class="btn mini cal-ptz-btn" data-action="zoom_out" title="Zoom out">−</button>
            <button class="btn mini cal-ptz-btn" data-action="zoom_in"  title="Zoom in">+</button>
          </div>
          <div class="cal-ptz-row">
            <span class="muted" style="font-size:11px;width:52px">Focus</span>
            <button class="btn mini cal-ptz-btn" data-action="focus_near" title="Focus near">Near</button>
            <button class="btn mini cal-ptz-btn" data-action="focus_far"  title="Focus far">Far</button>
            <button class="btn mini" id="cal-autofocus-btn" title="One-shot auto focus">Auto</button>
          </div>
        </div>
        <div id="cal-ptz-status" class="muted" style="margin-top:4px;font-size:11px"></div>
      </div>

    </div>

    <!-- ── Right panel: preview + histogram ────────────────────────── -->
    <div class="cal-main">

      <!-- Video / frame preview -->
      <div class="subpanel" style="flex:1;min-width:0">
        <div class="cal-preview-wrap" id="cal-preview-wrap">
          <!-- Placeholder shown when no frame loaded -->
          <div class="cal-placeholder" id="cal-placeholder">
            <span class="muted">Select a camera and grab a frame.</span>
          </div>
          <!-- Frame layers (hidden until first frame) -->
          <div class="cal-layers" id="cal-layers" style="display:none">
            <!-- Raw source images (layout anchors; always hold unfiltered data) -->
            <img id="cal-frame-img"  class="cal-frame-img" alt="">
            <img id="cal-stream-img" class="cal-frame-img" alt="" style="display:none">
            <!-- Filter canvas: covers raw img when a filter is active (z-index 1) -->
            <canvas id="cal-filter-canvas" class="cal-overlay-canvas" style="display:none;z-index:1"></canvas>
            <!-- Mask overlay canvas (z-index 2) -->
            <canvas id="cal-mask-canvas"   class="cal-overlay-canvas" style="z-index:2"></canvas>
            <!-- Interaction canvas — topmost (z-index 3) -->
            <canvas id="cal-interact-canvas" class="cal-overlay-canvas cal-crosshair" style="z-index:3"></canvas>
          </div>
        </div>

        <!-- Pixel info bar -->
        <div id="cal-pixel-bar" class="cal-pixel-bar" style="display:none">
          <span id="cal-pixel-coords" class="cal-pixel-chip"></span>
          <span id="cal-pixel-rgb"    class="cal-pixel-chip"></span>
          <span id="cal-pixel-swatch" class="cal-pixel-swatch"></span>
        </div>
      </div>

      <!-- Histogram -->
      <div class="subpanel cal-hist-panel" id="cal-hist-panel" style="display:none">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:12px;font-weight:600">Histogram</span>
          <div style="display:flex;gap:6px">
            <label class="cal-ch-toggle"><input type="checkbox" id="cal-ch-lum" checked><span style="color:#ccc">L</span></label>
            <label class="cal-ch-toggle"><input type="checkbox" id="cal-ch-r"   checked><span style="color:#f76">R</span></label>
            <label class="cal-ch-toggle"><input type="checkbox" id="cal-ch-g"   checked><span style="color:#6f6">G</span></label>
            <label class="cal-ch-toggle"><input type="checkbox" id="cal-ch-b"   checked><span style="color:#68f">B</span></label>
          </div>
        </div>
        <canvas id="cal-hist-canvas" class="cal-hist-canvas"></canvas>
      </div>

    </div><!-- .cal-main -->
  </div><!-- .cal-layout -->
</section>
<script src="/static/calibration.js"></script>
{% endblock %}
