{% extends "base.html" %}
{% block content %}
<section class="panel panel--nochrome panel--preview-page">
  <div class="controls-trans controls-trans--preview">
    <div class="subpanel">
      <div class="control-group header-left" style="margin-bottom: 8px">
        <h1>Preview</h1>
        <p class="muted">Preview a video with superimposed tracking.</p>
      </div>
      <div class="control-group">
        <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap">
          <div class="module-file-chip" data-module="preview" data-video="{{ video or '' }}" id="preview-chip" style="flex: 1; min-width: 0"></div>
          <input type="text" id="an-name" value="{{ video or '' }}" readonly style="display:none" />
          <button class="btn" id="preview-help-shortcuts" title="Show keyboard shortcuts">?</button>
        </div>
      </div>

      <div class="control-group preview-video-group">
        <div class="video-wrap preview-video-wrap">
          <div class="video-preview preview-drop-target" id="preview-drop-target">
            <div class="preview-drop-overlay" id="preview-drop-overlay">Drop video to preview</div>
            <div class="preview-video-inner" style="position:relative">
              <video id="an-video" preload="metadata" controls
                style="display:block; width:100%; object-fit:contain; background: var(--surface)"></video>
              <canvas id="an-canvas"
                style="position:absolute; left:0; top:0; width:100%; height:100%; pointer-events:none"></canvas>
            </div>
          </div>
        </div>
      </div>

      <div class="muted" id="an-msg" style="margin-top: 8px"></div>
      <div class="detail-grid" style="grid-template-columns: auto 1fr auto 1fr; margin-top: 8px">
        <div class="key">Time</div>
        <div id="an-time">0:00.000</div>
        <div class="key">FPS</div>
        <div id="an-fps">—</div>
        <div class="key">Frames</div>
        <div id="an-frames">—</div>
      </div>
    </div>
  </div>
</section>
<script src="/static/preview.js"></script>
{% endblock %}
