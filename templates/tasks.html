{% extends "base.html" %}
{% block content %}
<div class="panel">
  <div class="panel-header" style="display:flex; align-items:center; justify-content:space-between; gap:12px">
    <div>
      <h1 id="tasks-title" style="margin:0; display:flex; align-items:center; gap:10px">
        Tasks
        <span id="tasks-live" class="tasks-live">
          <span class="dot"></span>
          <span class="label">Running</span>
        </span>
      </h1>
      <div class="muted">Shared queue of long-running jobs. All users can watch progress and cancel active work.</div>
    </div>
    <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap">
      <label class="muted" style="display:flex; align-items:center; gap:6px; font-size:13px">
        <input type="checkbox" id="show-active-only" />
        Show only active
      </label>
      <button class="btn" id="cancel-all">Cancel all</button>
      <button class="btn" id="refresh-tasks">Refresh</button>
    </div>
  </div>
  <div id="tasks-list" class="task-list placeholder">Loading tasks…</div>
</div>

<style>
  .task-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 14px;
    border: 1px solid var(--border, #2b2b2b);
    border-radius: 10px;
    background: var(--panel-bg, #121212);
    margin-bottom: 10px;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  .task-row:hover {
    background: var(--surface, #181818);
    border-color: var(--border-strong, #3a3a3a);
  }
  .task-main {
    flex: 1;
    min-width: 0;
  }
  .task-title {
    font-weight: 700;
    font-size: 16px;
    margin-bottom: 4px;
  }
  .task-sub {
    color: var(--muted, #a0a0a0);
    font-size: 13px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .status-pill {
    display: inline-flex;
    align-items: center;
    padding: 4px 8px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }
  .status-PENDING { background: #2d2d38; color: #f7c948; }
  .status-RUNNING { background: #1f2a44; color: #6db3ff; }
  .status-DONE { background: #123524; color: #5cf08d; }
  .status-FAILED { background: #3a1b1b; color: #ff8a80; }
  .status-ERROR { background: #3a1b1b; color: #ff8a80; }
  .status-CANCELLED { background: #3a2a1f; color: #ffb74d; }
  .status-QUEUED { background: #2a2a2f; color: #c9d1d9; }
  .progress-rail {
    position: relative;
    width: 160px;
    height: 8px;
    border-radius: 999px;
    background: var(--muted, #303030);
    overflow: hidden;
  }
  .progress-bar {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    background: linear-gradient(90deg, #f6c344, #ff8a00);
    border-radius: 999px;
    width: 0%;
    transition: width 0.2s ease;
  }
  .task-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .task-details {
    margin-top: -6px;
    margin-bottom: 12px;
    padding: 10px 14px 2px 14px;
    border-left: 3px solid var(--border, #2b2b2b);
    background: var(--card, rgba(255,255,255,0.02));
    border-radius: 0 0 10px 10px;
    display: none;
  }
  .task-row[data-open="1"] + .task-details {
    display: block;
  }
  .plan-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 8px;
  }
  .plan-camera {
    padding: 8px 10px;
    border: 1px solid var(--border, #2b2b2b);
    border-radius: 8px;
    background: var(--panel-bg, #121212);
  }
  .plan-camera h4 {
    margin: 0 0 6px 0;
    font-size: 13px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .plan-day {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    font-size: 13px;
    padding: 3px 0;
  }
  .plan-day .muted {
    font-size: 12px;
  }
  #tasks-title .tasks-live {
    display: none;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    color: #6db3ff;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  #tasks-title.running .tasks-live {
    display: inline-flex;
  }
  #tasks-title .tasks-live .dot {
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: #6db3ff;
    box-shadow: 0 0 0 0 rgba(109, 179, 255, 0.6);
    animation: tasksPulse 1.2s ease-in-out infinite;
  }
  @keyframes tasksPulse {
    0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(109, 179, 255, 0.55); }
    70% { transform: scale(1.2); box-shadow: 0 0 0 8px rgba(109, 179, 255, 0); }
    100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(109, 179, 255, 0); }
  }
  .task-section-title {
    margin: 14px 0 8px 0;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted, #a0a0a0);
  }
  /* Log viewer modal scrollbar */
  #log-modal-pre::-webkit-scrollbar { width: 8px; height: 8px; }
  #log-modal-pre::-webkit-scrollbar-track { background: #0d1117; }
  #log-modal-pre::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
  #log-modal-pre::-webkit-scrollbar-thumb:hover { background: #484f58; }
</style>

<script src="/static/tasks.js"></script>
{% endblock %}
