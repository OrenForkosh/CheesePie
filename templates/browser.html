{% extends 'base.html' %} {% block content %}
<section class="panel panel-browser">

  <div class="layout">
    <div class="browser-main">
      <div class="panel-header">
        <div class="header-left">
          <h1>File Browser</h1>
          <p class="muted">
            Browse experiment videos, filter, and inspect details.
          </p>
        </div>
      </div>
      <div class="header-controls">
        <div class="inline browser-nav-row">
          <div id="breadcrumb-bar" class="breadcrumb-bar" aria-label="Current path"></div>
          <div class="browser-toolbar">
            <div class="search-wrap">
              <input id="search-input" type="text" placeholder="Filter…" />
              <button id="clear-search" class="clear-x" title="Clear" aria-label="Clear search" hidden>×</button>
            </div>
            <div class="browser-sort-seg" id="browser-sort-seg" role="group" aria-label="Sort by">
              <button class="sort-seg active" data-sort="name">Name <span class="sort-dir">↑</span></button>
              <button class="sort-seg" data-sort="date">Date</button>
              <button class="sort-seg" data-sort="size">Size</button>
            </div>
          </div>
        </div>
        <div id="browser-item-count" class="browser-item-count muted"></div>
      </div>
      <div class="file-list" id="file-list">
        <div class="placeholder muted">Select a facility to load files.</div>
      </div>
    </div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">
        <div class="muted" id="actions-placeholder">
          Select a file to see available actions.
        </div>
        <div id="actions"></div>
        <div id="details"></div>
      </div>
    </aside>
  </div>
</section>

<section id="browser-track" class="panel browser-track-panel" hidden>
  <div class="browser-track-header">
    <h1>Tracking</h1>
    <div class="browser-track-meta">
      <div class="muted" id="track-status">Idle</div>
      <div class="browser-track-actions">
        <button class="btn mini" id="track-cancel" disabled>Cancel</button>
        <button class="btn mini" id="track-retry" disabled>Retry failed</button>
      </div>
    </div>
  </div>
  <div id="track-panel">
    <div class="table-wrap browser-track-table-wrap">
      <table id="track-table">
        <thead>
          <tr>
            <th>File</th>
            <th class="browser-track-col">Status</th>
            <th class="browser-track-col">Step</th>
            <th class="browser-track-col">Progress</th>
            <th class="browser-track-col">Log</th>
          </tr>
        </thead>
        <tbody id="track-body"></tbody>
      </table>
    </div>
  </div>
</section>
{% endblock %}
